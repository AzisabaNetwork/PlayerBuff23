name: PlayerBuff
version: '${version}'
main: net.azisaba.playerbuff.PlayerBuff
api-version: '1.15'
authors: [ Azisaba Network ]

commands:
  playerbuff:
    description: PlayerBuff main command
    permission: playerbuff.command.main
  playerbuffset:
    description: PlayerBuff set command
    aliases:
      - pbset
      - pbs
    permission: playerbuff.command.set

permissions:
  playerbuff.command.*:
    description: Permission to use PlayerBuff commands
    children:
      playerbuff.command.main: true
      playerbuff.command.set: true
    default: op
  playerbuff.command.main:
    description: Permission to use PlayerBuff main command
    default: op
  playerbuff.command.set:
    description: Permission to set PlayerBuff
    default: op